[server]
host = "0.0.0.0"
port = 3000
admin_password = "zenproxy123"
min_trust_level = 1

[oauth]
client_id = ""
client_secret = ""
redirect_uri = "https://proxy.zenapi.top/api/auth/callback"

[singbox]
binary_path = "/usr/local/bin/sing-box"
config_path = "data/singbox-config.json"
base_port = 10001
max_proxies = 300

[database]
path = "data/zenproxy.db"

[validation]
url = "https://www.bing.com"
timeout_secs = 10
concurrency = 50
interval_mins = 30
error_threshold = 10
batch_size = 30

[quality]
interval_mins = 120
concurrency = 10

[subscription]
auto_refresh_interval_mins = 0    # 0 = disabled, e.g. 360 = 6h
